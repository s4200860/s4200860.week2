<!DOCTYPE html>
<html>
<head>
    <title>Week2 - Artwork inspired by Malevich</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="gallery-wrapper">
        <div class="cool-canvas">
            <div class="shape navy-slab"></div>
            <div class="shape grey-rectangle"></div>

            <div class="grid-group">
                <div class="grid-line line-1"></div>
                <div class="grid-line line-2"></div>
                <div class="grid-line line-3"></div>
            </div>

            <div class="shape central-rectangle"></div>
            <div class="shape teal-block"></div>
            
            <div class="vertical-strip-stack">
                <div class="strip white"></div>
                <div class="strip teal"></div>
                <div class="strip grey"></div>
                <div class="bottom-line"></div>
            </div>

            <div class="shape white-square"></div>
            <div class="shape small-blue-rectangle"></div>
            <div class="shape central-line"></div>

        </div>
    </div>
</body>
</html>
